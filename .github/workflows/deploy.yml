name: Deploy fc-landing-api

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-fc-landing-api
  cancel-in-progress: false

env:
  APP_NAME: fc-landing-api
  APP_DIR: /opt/fc-landing-api
  KEEP_RELEASES: 5
  HEALTH_PORT: 3022

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build artifact
        run: |
          set -euo pipefail
          tar --exclude='./.git' \
              --exclude='./.github' \
              --exclude='./node_modules' \
              --exclude='./.DS_Store' \
              --exclude='**/.DS_Store' \
              --exclude='./.env' \
              --exclude='./.env.*' \
              -czf "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz" .
          ls -lh "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"

      - name: Upload to VPS
        run: |
          set -euo pipefail
          scp -P "${{ secrets.VPS_PORT || '22' }}" \
              -o StrictHostKeyChecking=accept-new \
              "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz" \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"

      - name: Activate release
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.VPS_PORT || '22' }}" \
              -o StrictHostKeyChecking=accept-new \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              APP_DIR="$APP_DIR" \
              APP_NAME="$APP_NAME" \
              KEEP_RELEASES="$KEEP_RELEASES" \
              HEALTH_PORT="$HEALTH_PORT" \
              GITHUB_SHA="$GITHUB_SHA" \
              'bash -se' <<'REMOTE'
          set -euo pipefail

          : "${APP_DIR:?missing}"
          : "${APP_NAME:?missing}"
          : "${GITHUB_SHA:?missing}"
          : "${KEEP_RELEASES:=5}"
          : "${HEALTH_PORT:=3022}"

          if [ ! -d "$APP_DIR" ] || [ ! -d "$APP_DIR/releases" ] || [ ! -d "$APP_DIR/shared" ]; then
            echo "ERROR: $APP_DIR is not bootstrapped (releases/ shared/ отсутствуют)." >&2
            exit 1
          fi
          if [ ! -f "$APP_DIR/shared/.env" ]; then
            echo "ERROR: $APP_DIR/shared/.env отсутствует — заполни TG_BOT_TOKEN, TG_CHAT_ID." >&2
            exit 1
          fi

          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz" -C "$RELEASE_DIR"
          rm -f "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"

          # Симлинк на shared/.env, чтобы pm2 подхватил его как dotenv через cwd.
          ln -sfn "$APP_DIR/shared/.env" "$RELEASE_DIR/.env"

          # Атомарное переключение current.
          ln -sfn "$RELEASE_DIR" "$APP_DIR/current.new"
          mv -Tf "$APP_DIR/current.new" "$APP_DIR/current"

          # Подгружаем переменные из .env в текущий shell, чтобы pm2 их получил через --update-env.
          set -a
          # shellcheck disable=SC1091
          . "$APP_DIR/shared/.env"
          set +a

          # Запуск/перезапуск через pm2. Делаем delete+start вместо startOrReload, потому что
          # pm2 запоминает резолвенный путь к script (не симлинк) — после смены current новый
          # код не подхватывается без явного пересоздания процесса.
          cd "$APP_DIR/current"
          pm2 delete "$APP_NAME" 2>/dev/null || true
          pm2 start ecosystem.config.cjs --update-env
          pm2 save

          # Healthcheck — 5 попыток.
          OK=0
          for i in 1 2 3 4 5; do
            sleep 1
            if curl -fsS "http://127.0.0.1:${HEALTH_PORT}/api/health" >/dev/null; then
              echo "Healthcheck OK on attempt $i"
              OK=1
              break
            fi
          done
          if [ "$OK" != "1" ]; then
            echo "ERROR: healthcheck failed" >&2
            pm2 logs "$APP_NAME" --lines 50 --nostream || true
            exit 1
          fi

          # Чистка старых релизов.
          cd "$APP_DIR/releases"
          ls -1t | tail -n +"$((KEEP_RELEASES + 1))" | while read -r old; do
            if [ "$old" != "$GITHUB_SHA" ]; then
              rm -rf -- "$old"
            fi
          done

          echo "Deploy OK: $GITHUB_SHA"
          REMOTE

      - name: Public healthcheck
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://media-konveyer.ru/api/health || true)
            echo "Attempt ${i}: HTTP ${code}"
            if [ "${code}" = "200" ]; then
              echo "Public healthcheck OK"
              exit 0
            fi
            sleep 3
          done
          echo "Public healthcheck FAILED" >&2
          exit 1
